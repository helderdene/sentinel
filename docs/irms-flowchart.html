<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#f0f4f9;color:#1a2740;font-family:'Barlow Condensed',sans-serif;overflow:hidden}

/* ── Canvas/Viewport ─────────────────────────────────────────────────────── */
#viewport{width:100%;height:100%;overflow:hidden;position:relative;cursor:grab;user-select:none}
#viewport.dragging{cursor:grabbing}
#canvas{position:absolute;transform-origin:0 0;will-change:transform}

/* ── Top Bar ──────────────────────────────────────────────────────────────── */
#topbar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(255,255,255,.97);border-bottom:1px solid rgba(0,0,0,.1);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100;backdrop-filter:blur(12px);box-shadow:0 1px 12px rgba(0,0,0,.08)}
.tb-title{font-size:15px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:.5px;color:#1a2740}
.tb-sub{font-size:11px;color:#6b8aaa;font-family:'Space Mono',monospace}
.tb-divider{width:1px;height:20px;background:rgba(0,0,0,.1)}
.zoom-btn{background:#f0f4f9;border:1px solid rgba(0,0,0,.12);color:#1a2740;padding:5px 12px;border-radius:7px;cursor:pointer;font-family:'Space Mono',monospace;font-size:12px;transition:background .15s}
.zoom-btn:hover{background:#e2eaf4}
#zoom-label{font-family:'Space Mono',monospace;font-size:11px;color:#6b8aaa;min-width:44px;text-align:center}
.fit-btn{background:rgba(74,158,255,.15);border:1px solid rgba(74,158,255,.3);color:#4a9eff;padding:5px 14px;border-radius:7px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.5px;transition:all .15s}
.fit-btn:hover{background:rgba(74,158,255,.25)}

/* ── Legend ───────────────────────────────────────────────────────────────── */
#legend{position:fixed;bottom:20px;right:20px;background:rgba(255,255,255,.97);border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:14px 16px;backdrop-filter:blur(12px);z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.leg-row{display:flex;align-items:center;gap:9px;margin-bottom:7px;font-size:12px;color:#3d5470}
.leg-row:last-child{margin-bottom:0}
.leg-swatch{width:16px;height:16px;border-radius:4px;flex-shrink:0}
.leg-line{width:28px;height:2px;flex-shrink:0;border-radius:1px}
.leg-dash{width:28px;height:0;flex-shrink:0;border-top:2px dashed}
.leg-dot-line{width:28px;height:2px;border-top:2px dotted;flex-shrink:0}

/* ── Tooltip ──────────────────────────────────────────────────────────────── */
#tooltip{position:fixed;display:none;background:rgba(255,255,255,.99);border:1px solid rgba(0,0,0,.1);border-radius:10px;padding:12px 16px;max-width:240px;z-index:200;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.15)}
#tooltip .tt-title{font-size:12px;font-weight:700;font-family:'Space Mono',monospace;margin-bottom:5px;color:#2271d4}
#tooltip .tt-body{font-size:13px;color:#4a6080;line-height:1.5}

/* ── Minimap ──────────────────────────────────────────────────────────────── */
#minimap{position:fixed;bottom:20px;left:20px;width:160px;height:110px;background:rgba(6,12,24,.9);border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden;z-index:100}
#minimap canvas{width:100%;height:100%}

@keyframes flowDash{to{stroke-dashoffset:-20}}
@keyframes pulseNode{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>

   DRAWING UTILITIES
   ══════════════════════════════════════════════════════════════════════════ */

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function diamond(ctx, cx, cy, w, h){
  const hw=w/2, hh=h/2;
  ctx.beginPath();
  ctx.moveTo(cx, cy-hh);
  ctx.lineTo(cx+hw, cy);
  ctx.lineTo(cx, cy+hh);
  ctx.lineTo(cx-hw, cy);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH, maxLines=3){
  const lines = text.split('\n');
  let drawn = 0;
  for(const raw of lines){
    if(drawn>=maxLines) break;
    const words = raw.split(' ');
    let line = '';
    for(const word of words){
      const test = line ? line+' '+word : word;
      if(ctx.measureText(test).width > maxW && line){
        ctx.fillText(line, x, y + drawn*lineH);
        line = word; drawn++;
        if(drawn>=maxLines) break;
      } else line = test;
    }
    if(drawn<maxLines){ ctx.fillText(line, x, y + drawn*lineH); drawn++; }
  }
}

/* ── Draw a node ──────────────────────────────────────────────────────────── */
function drawNode(node, hovered){
  const { x, y, w, h, type, label, icon } = node;
  const style = C[type] || C.process;
  const lx = x - w/2, ly = y - h/2;
  const r = type==='decision' ? 0 : 10;
  const glow = hovered ? 8 : 0;

  ctx.save();

  // Glow on hover
  if(hovered){
    ctx.shadowColor = style.stroke;
    ctx.shadowBlur = 14;
  }

  // Shape
  if(type === 'decision'){
    diamond(ctx, x, y, w*1.15, h*1.3);
  } else {
    roundRect(ctx, lx, ly, w, h, r);
  }
  if(!hovered){ctx.shadowColor='rgba(0,0,0,.12)';ctx.shadowBlur=8;ctx.shadowOffsetY=2;}
  ctx.fillStyle = style.fill;
  ctx.fill();
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  ctx.strokeStyle = hovered ? style.stroke : style.stroke + 'bb';
  ctx.lineWidth = hovered ? 2 : 1.5;
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Icon
  const ICON_SIZE = 16;
  ctx.font = `${ICON_SIZE}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if(type !== 'decision'){
    ctx.fillText(icon, lx + 22, y);
  } else {
    ctx.fillText(icon, x, y - h*0.55);
  }

  // Label
  ctx.fillStyle = hovered ? '#04080f' : style.text;
  ctx.font = `600 11px 'Barlow Condensed', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const textX = type!=='decision' ? x + 8 : x;
  const textY = type!=='decision' ? y : y + 2;
  const maxW  = type!=='decision' ? w - 40 : w * 0.9;
  const lines = label.split('\n');
  const lineH = 14;
  const totalH = lines.length * lineH;
  lines.forEach((line, i) => {
    ctx.fillText(line, textX, textY - totalH/2 + lineH*0.5 + i*lineH);
  });

  ctx.restore();
}

/* ── Arrowhead ──────────────────────────────────────────────────────────── */
function arrowHead(x, y, angle, color){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-9, -4);
  ctx.lineTo(-9, 4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

/* ── Get node edge point ─────────────────────────────────────────────────── */
function getNodePoint(node, toX, toY, bias=0){
  const { x, y, w, h, type } = node;
  const dx = toX - x, dy = toY - y;
  if(type === 'decision'){
    const hw = w*1.15/2, hh = h*1.3/2;
    const t = Math.abs(dx/hw) > Math.abs(dy/hh)
      ? hw / Math.abs(dx) : hh / Math.abs(dy);
    return { x: x + dx*t, y: y + dy*t };
  }
  const hw = w/2, hh = h/2;
  if(Math.abs(dy) * hw > Math.abs(dx) * hh){
    return { x: x + dx*(hh/Math.abs(dy)), y: dy>0 ? y+hh : y-hh };
  } else {
    return { x: dx>0 ? x+hw : x-hw, y: y + dy*(hw/Math.abs(dx)) };
  }
}

/* ── Draw an arrow ───────────────────────────────────────────────────────── */
function drawArrow(arrow, animOffset){
  const from = NODES.find(n=>n.id===arrow.from);
  const to   = NODES.find(n=>n.id===arrow.to);
  if(!from||!to) return;

  const colors = {
    primary: '#2271d4',
    cond:    '#c49200',
    notify:  '#7c3cc8',
  };
  const color = colors[arrow.type] || '#4a9eff';

  const mx = (from.x + to.x)/2, my = (from.y + to.y)/2;
  const sp = getNodePoint(from, to.x, to.y);
  const ep = getNodePoint(to, from.x, from.y);
  const dx = ep.x - sp.x, dy = ep.y - sp.y;
  const angle = Math.atan2(dy, dx);

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = arrow.type==='primary' ? 2 : 1.5;
  ctx.globalAlpha = arrow.type==='primary' ? 0.75 : 0.55;

  if(arrow.type === 'notify'){
    ctx.setLineDash([4, 5]);
    ctx.lineDashOffset = -animOffset * 0.3;
  } else if(arrow.type === 'cond'){
    ctx.setLineDash([8, 5]);
  } else {
    // Animated flowing dash for primary
    ctx.setLineDash([10, 8]);
    ctx.lineDashOffset = -animOffset * 0.5;
  }

  ctx.beginPath();
  // Bezier for curved paths
  const dist = Math.hypot(dx, dy);
  const cx1 = sp.x, cy1 = sp.y + (dy > 0 ? dist*0.2 : -dist*0.2);
  const cx2 = ep.x, cy2 = ep.y - (dy > 0 ? dist*0.2 : -dist*0.2);
  if(Math.abs(dx) < 20 && Math.abs(dy) > 60){
    ctx.moveTo(sp.x, sp.y);
    ctx.lineTo(ep.x, ep.y);
  } else {
    ctx.moveTo(sp.x, sp.y);
    ctx.bezierCurveTo(cx1, cy1, cx2, cy2, ep.x, ep.y);
  }
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 0.9;
  arrowHead(ep.x, ep.y, angle, color);

  // Label
  if(arrow.label){
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = color;
    ctx.font = `500 10px 'Barlow Condensed', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lx = (sp.x + ep.x)/2, ly = (sp.y + ep.y)/2;
    // Background pill
    const tw = ctx.measureText(arrow.label).width;
    roundRect(ctx, lx-tw/2-6, ly-9, tw+12, 16, 4);
    ctx.fillStyle = '#f0f4f9';
    ctx.fill();
    ctx.fillStyle = color;
    ctx.fillText(arrow.label, lx, ly);
  }
  ctx.restore();
}

/* ── Draw swimlanes ──────────────────────────────────────────────────────── */
function drawLanes(){
  LANES.forEach(lane => {
    const lw = CANVAS_W - 40;
    ctx.save();
    // Fill
    ctx.fillStyle = lane.color + '0b';
    roundRect(ctx, 20, lane.y, lw, lane.h, 8);
    ctx.fill();
    // Border
    ctx.strokeStyle = lane.color + '45';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Label strip
    const stripW = 130;
    roundRect(ctx, 20, lane.y, stripW, lane.h, 8);
    ctx.fillStyle = lane.color + '50';
    ctx.fill();
    // Vertical label
    ctx.save();
    ctx.translate(20 + stripW/2, lane.y + lane.h/2);
    ctx.rotate(-Math.PI/2);
    ctx.fillStyle = '#ffffff';
    ctx.font = `700 11px 'Space Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.letterSpacing = '2px';
    ctx.fillText(lane.label, 0, 0);
    ctx.restore();
    // Divider line
    ctx.beginPath();
    ctx.moveTo(20+stripW, lane.y);
    ctx.lineTo(20+stripW, lane.y+lane.h);
    ctx.strokeStyle = lane.color + '40';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  });
}

/* ── Main render ──────────────────────────────────────────────────────────── */
let animOffset = 0;
let hoveredNode = null;
let raf;

function render(){
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // Background
  ctx.fillStyle = '#f0f4f9';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Grid dots
  ctx.fillStyle = 'rgba(0,30,80,.04)';
  for(let gx=0; gx<CANVAS_W; gx+=40){
    for(let gy=0; gy<CANVAS_H; gy+=40){
      ctx.beginPath();
      ctx.arc(gx, gy, 1, 0, Math.PI*2);
      ctx.fill();
    }
  }

  drawLanes();

  // Arrows first (behind nodes)
  ARROWS.forEach(a => drawArrow(a, animOffset));

  // Nodes
  NODES.forEach(node => drawNode(node, node === hoveredNode));

  // Title blocks for each layer
  const labelY = { reporter:100, intake:315, dispatch:795, responder:1376, system:2275, post:2576 };

  animOffset += 1;
  raf = requestAnimationFrame(render);
}

/* ══════════════════════════════════════════════════════════════════════════
   INTERACTION
   ══════════════════════════════════════════════════════════════════════════ */

const viewport = document.getElementById('viewport');
let curScale = 0.38, curPanX = 20, curPanY = 70;
let isDragging = false, dragStartX, dragStartY, panStartX, panStartY;

function applyTransform(){
  canvas.style.transform = `translate(${curPanX}px,${curPanY}px) scale(${curScale})`;
  canvas.style.transformOrigin = '0 0';
  document.getElementById('zoom-label').textContent = Math.round(curScale*100)+'%';
}

function zoom(delta, cx, cy){
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const ox = cx !== undefined ? cx : vw/2;
  const oy = cy !== undefined ? cy : vh/2;
  const prev = curScale;
  curScale = Math.min(2, Math.max(0.15, curScale + delta));
  const ratio = curScale / prev;
  curPanX = ox - (ox - curPanX) * ratio;
  curPanY = oy - (oy - curPanY) * ratio;
  applyTransform();
}
window.zoom = zoom;

function fitView(){
  const vw = viewport.clientWidth - 40;
  const vh = viewport.clientHeight - 80;
  curScale = Math.min(vw / CANVAS_W, vh / CANVAS_H);
  curPanX = (viewport.clientWidth  - CANVAS_W * curScale) / 2;
  curPanY = 60 + (viewport.clientHeight - 60 - CANVAS_H * curScale) / 2;
  applyTransform();
}
window.fitView = fitView;

// Pan
viewport.addEventListener('mousedown', e => {
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX  = curPanX;   panStartY  = curPanY;
  viewport.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if(isDragging){
    curPanX = panStartX + (e.clientX - dragStartX);
    curPanY = panStartY + (e.clientY - dragStartY);
    applyTransform();
  }
  // Hover
  const cx = (e.clientX - curPanX) / curScale;
  const cy = (e.clientY - curPanY) / curScale;
  const found = NODES.find(n => {
    const hw = (n.type==='decision'?n.w*1.15:n.w)/2;
    const hh = (n.type==='decision'?n.h*1.3:n.h)/2;
    return Math.abs(cx-n.x) < hw && Math.abs(cy-n.y) < hh;
  });
  if(found !== hoveredNode){
    hoveredNode = found;
    const tt = document.getElementById('tooltip');
    if(found){
      document.getElementById('tt-title').textContent = found.label.replace('\n',' ');
      document.getElementById('tt-body').textContent  = found.detail;
      tt.style.display = 'block';
      tt.style.animation = 'fadeIn .15s ease';
    } else {
      tt.style.display = 'none';
    }
  }
  if(found){
    const tt = document.getElementById('tooltip');
    const margin = 16;
    let tx = e.clientX + 18, ty = e.clientY + 12;
    if(tx + 260 > window.innerWidth)  tx = e.clientX - 260 - margin;
    if(ty + 150 > window.innerHeight) ty = e.clientY - 150 - margin;
    tt.style.left = tx + 'px';
    tt.style.top  = ty + 'px';
  }
});
window.addEventListener('mouseup', ()=>{ isDragging=false; viewport.classList.remove('dragging'); });

// Scroll to zoom
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 0.08 : -0.08, e.clientX, e.clientY);
}, { passive: false });

// Touch pan/zoom
let lastTouchDist = null, lastTouchMidX, lastTouchMidY;
viewport.addEventListener('touchstart', e => {
  if(e.touches.length===2){
    lastTouchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    lastTouchMidX = (e.touches[0].clientX+e.touches[1].clientX)/2;
    lastTouchMidY = (e.touches[0].clientY+e.touches[1].clientY)/2;
  } else if(e.touches.length===1){
    isDragging = true;
    dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    panStartX = curPanX; panStartY = curPanY;
  }
  e.preventDefault();
},{ passive: false });
viewport.addEventListener('touchmove', e => {
  if(e.touches.length===2){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const mx = (e.touches[0].clientX+e.touches[1].clientX)/2;
    const my = (e.touches[0].clientY+e.touches[1].clientY)/2;
    zoom((d-lastTouchDist)*0.005, mx, my);
    lastTouchDist=d; lastTouchMidX=mx; lastTouchMidY=my;
  } else if(e.touches.length===1 && isDragging){
    curPanX = panStartX + (e.touches[0].clientX - dragStartX);
    curPanY = panStartY + (e.touches[0].clientY - dragStartY);
    applyTransform();
  }
  e.preventDefault();
},{ passive: false });
viewport.addEventListener('touchend', () => { isDragging = false; lastTouchDist = null; });

/* ── Boot ──────────────────────────────────────────────────────────────────── */
resizeCanvas();
fitView();
render();
</script>
</body>
