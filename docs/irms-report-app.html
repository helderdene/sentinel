<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IRMS Report App — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;background:#dde3ec;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
  #root{display:flex;align-items:center;justify-content:center;width:100%;height:100%}

  /* Phone frame */
  .phone{
    width:390px;height:844px;
    background:#f4f6f9;
    border-radius:50px;
    box-shadow:
      0 0 0 10px #1a1a2e,
      0 0 0 12px #2a2a40,
      0 40px 80px rgba(0,0,0,.35),
      0 10px 20px rgba(0,0,0,.20);
    overflow:hidden;
    position:relative;
    display:flex;flex-direction:column;
  }
  /* Status bar */
  .statusbar{
    height:44px;background:#ffffff;
    display:flex;align-items:center;
    padding:0 28px;
    justify-content:space-between;
    flex-shrink:0;
    position:relative;z-index:20;
  }
  /* Notch */
  .statusbar::after{
    content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:120px;height:34px;background:#1a1a2e;border-radius:0 0 22px 22px;
  }
  /* Screen container */
  .screen-wrap{flex:1;overflow:hidden;position:relative;}
  .screen{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    overflow:hidden;
    transition:transform .35s cubic-bezier(.4,0,.2,1), opacity .35s ease;
  }
  .screen.enter{transform:translateX(100%);opacity:0}
  .screen.active{transform:translateX(0);opacity:1}
  .screen.exit{transform:translateX(-40%);opacity:0}
  .screen.enter-back{transform:translateX(-100%);opacity:0}
  .screen.exit-back{transform:translateX(40%);opacity:0}

  /* Scrollable body */
  .scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
  .scroll::-webkit-scrollbar{display:none}

  /* Bottom nav */
  .bottomnav{
    height:80px;background:#fff;border-top:1px solid #e2e8f0;
    display:flex;align-items:flex-start;padding-top:10px;
    flex-shrink:0;
  }
  .navitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0}
  .navlabel{font-size:10px;font-weight:500;letter-spacing:.3px}

  /* Misc */
  input,textarea,select{font-family:'DM Sans',sans-serif;outline:none}
  textarea{resize:none}
  button{cursor:pointer;font-family:'DM Sans',sans-serif}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  @keyframes scaleIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
  @keyframes checkDraw{from{stroke-dashoffset:60}to{stroke-dashoffset:0}}
  @keyframes circleDraw{from{stroke-dashoffset:200}to{stroke-dashoffset:0}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>

function mkId(){return'RPT-'+Math.random().toString(36).slice(2,7).toUpperCase();}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'})}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-PH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
function elapsed(ts){const m=Math.floor((Date.now()-ts)/60000);if(m<1)return'Just now';if(m<60)return`${m}m ago`;return`${Math.floor(m/60)}h ${m%60}m ago`;}

// ── Components ────────────────────────────────────────────────────────────────
function StatusBar(){
  const [t,setT]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(id)},[]);
  return(
    <div className="statusbar">
      <span style={{fontSize:13,fontWeight:600,color:T.text,fontFamily:"'Space Mono',monospace",zIndex:1}}>
        {t.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'})}
      </span>
      <div style={{display:'flex',alignItems:'center',gap:5,zIndex:1}}>
        {/* Signal bars */}
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <rect x="0" y="8" width="3" height="4" rx="1" fill={T.text}/>
          <rect x="4.5" y="5" width="3" height="7" rx="1" fill={T.text}/>
          <rect x="9" y="2" width="3" height="10" rx="1" fill={T.text}/>
          <rect x="13.5" y="0" width="3" height="12" rx="1" fill={T.text} opacity=".3"/>
        </svg>
        {/* WiFi */}
        <svg width="15" height="12" viewBox="0 0 15 12" fill="none">
          <path d="M1 4C3.5 1.5 11.5 1.5 14 4" stroke={T.text} strokeWidth="1.5" strokeLinecap="round"/>
          <path d="M3 7C4.7 5.3 10.3 5.3 12 7" stroke={T.text} strokeWidth="1.5" strokeLinecap="round"/>
          <path d="M5.5 9.5C6.3 8.7 8.7 8.7 9.5 9.5" stroke={T.text} strokeWidth="1.5" strokeLinecap="round"/>
          <circle cx="7.5" cy="11.5" r="1" fill={T.text}/>
        </svg>
        {/* Battery */}
        <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
          <rect x=".5" y=".5" width="20" height="11" rx="3" stroke={T.text} strokeOpacity=".4"/>
          <rect x="2" y="2" width="16" height="8" rx="2" fill={T.text}/>
          <path d="M21.5 4v4" stroke={T.text} strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
      </div>
    </div>
  );
}

function BottomNav({active,onNav}){
  const items=[
    {key:'home',label:'Home',icon:'home'},
    {key:'reports',label:'My Reports',icon:'list'},
    {key:'about',label:'About',icon:'info'},
  ];
  return(
    <div className="bottomnav">
      {items.map(it=>{
        const col=active===it.key?T.accent:T.textFaint;
        return(
          <div key={it.key} className="navitem" onClick={()=>onNav(it.key)}>
            {I[it.icon](22,col)}
            <span className="navlabel" style={{color:col}}>{it.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function PriBadge({p,sm}){
  return(
    <span style={{
      background:PBG[p],color:PCOLOR[p],border:`1px solid ${PCOLOR[p]}35`,
      borderRadius:4,padding:sm?'1px 6px':'2px 8px',
      fontSize:sm?8.5:10,fontFamily:"'Space Mono',monospace",fontWeight:700,letterSpacing:.6,
    }}>P{p} {PLABEL[p]}</span>
  );
}

function StatusBadge({s}){
  const col=STATUS_COLOR[s]||T.textFaint;
  const bg=col.replace('eb','2b').replace('26','2b');
  return(
    <span style={{
      background:`${col}14`,color:col,border:`1px solid ${col}35`,
      borderRadius:20,padding:'2px 10px',fontSize:10,fontFamily:"'Space Mono',monospace",fontWeight:700,letterSpacing:.5,
    }}>{s}</span>
  );
}

// ── Screen: Home ──────────────────────────────────────────────────────────────

// ── Screen: Details Form ──────────────────────────────────────────────────────
function DetailsScreen({incType,onSubmit,onBack}){
  const [brgy,setBrgy]=useState('');
  const [address,setAddress]=useState('');
  const [name,setName]=useState('');
  const [contact,setContact]=useState('');
  const [desc,setDesc]=useState('');
  const [loading,setLoading]=useState(false);
  const col=PCOLOR[incType.priority];

  const isValid=brgy&&desc.length>=10;

  const handleSubmit=()=>{
    if(!isValid)return;
    setLoading(true);
    setTimeout(()=>{
      onSubmit({
        id:mkId(),type:incType.key,priority:incType.priority,
        barangay:brgy,address,name:name||'Anonymous',contact,
        desc,ts:Date.now(),status:'RECEIVED',
      });
      setLoading(false);
    },1600);
  };

  const inp=(val,set,props={})=>(
    <input value={val} onChange={e=>set(e.target.value)}
      style={{
        width:'100%',background:T.surface,border:`1.5px solid ${T.border}`,
        borderRadius:10,padding:'11px 13px',fontSize:14,color:T.text,
        transition:'border-color .15s',
        ...props.style,
      }}
      onFocus={e=>e.target.style.borderColor=T.accent}
      onBlur={e=>e.target.style.borderColor=T.border}
      {...props}
    />
  );

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:T.bg}}>
      {/* Header */}
      <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:'14px 16px',flexShrink:0,boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
          <button onClick={onBack} style={{background:'none',border:`1px solid ${T.border}`,borderRadius:9,padding:'6px',display:'flex',alignItems:'center',width:36,height:36}}>
            {I.chevronLeft(20,T.textDim)}
          </button>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:T.text}}>Incident Details</div>
            <div style={{fontSize:11,color:T.textDim}}>Tell us what's happening</div>
          </div>
        </div>
        {/* Step */}
        <div style={{display:'flex',gap:4}}>
          {[1,2,3].map(n=>(
            <div key={n} style={{flex:1,height:3,borderRadius:2,background:n<=2?T.accent:T.border}}/>
          ))}
        </div>
      </div>

      {/* Incident type chip */}
      <div style={{padding:'14px 16px 0',flexShrink:0}}>
        <div style={{background:PBG[incType.priority],border:`1px solid ${col}30`,borderRadius:11,padding:'10px 14px',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:9,background:`${col}18`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            {I[incType.icon](20,col)}
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:T.text}}>{incType.key}</div>
            <PriBadge p={incType.priority} sm/>
          </div>
        </div>
      </div>

      <div className="scroll" style={{padding:'14px 16px 100px'}}>
        {/* Barangay */}
        <div style={{marginBottom:13}}>
          <label style={{fontSize:12,fontWeight:600,color:T.textDim,display:'block',marginBottom:5}}>
            Barangay <span style={{color:T.p1}}>*</span>
          </label>
          <select value={brgy} onChange={e=>setBrgy(e.target.value)} style={{
            width:'100%',background:T.surface,border:`1.5px solid ${brgy?T.border:T.border}`,
            borderRadius:10,padding:'11px 13px',fontSize:14,color:brgy?T.text:T.textFaint,
            appearance:'none',
          }}>
            <option value="">Select barangay…</option>
            {BRGYS.map(b=><option key={b}>{b}</option>)}
          </select>
        </div>

        {/* Landmark / Address */}
        <div style={{marginBottom:13}}>
          <label style={{fontSize:12,fontWeight:600,color:T.textDim,display:'block',marginBottom:5}}>Landmark / Address</label>
          {inp(address,setAddress,{placeholder:'e.g. Near the public market, beside school…'})}
        </div>

        {/* Description */}
        <div style={{marginBottom:13}}>
          <label style={{fontSize:12,fontWeight:600,color:T.textDim,display:'block',marginBottom:5}}>
            What happened? <span style={{color:T.p1}}>*</span>
          </label>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)}
            placeholder="Describe the situation clearly — who, what, how many people are involved…"
            rows={4}
            style={{
              width:'100%',background:T.surface,border:`1.5px solid ${T.border}`,
              borderRadius:10,padding:'11px 13px',fontSize:14,color:T.text,lineHeight:1.55,
            }}
            onFocus={e=>e.target.style.borderColor=T.accent}
            onBlur={e=>e.target.style.borderColor=T.border}
          />
          <div style={{fontSize:11,color:desc.length<10?T.textFaint:T.p4,marginTop:4,textAlign:'right'}}>
            {desc.length} characters {desc.length<10?`(need ${10-desc.length} more)`:'ok'}
          </div>
        </div>

        {/* Divider */}
        <div style={{height:1,background:T.border,margin:'4px 0 16px'}}/>
        <div style={{fontSize:11,color:T.textFaint,marginBottom:12}}>Optional — helps us contact you for follow-up</div>

        {/* Name */}
        <div style={{marginBottom:13}}>
          <label style={{fontSize:12,fontWeight:600,color:T.textDim,display:'block',marginBottom:5}}>Your Name</label>
          {inp(name,setName,{placeholder:'Full name (optional)'})}
        </div>

        {/* Contact */}
        <div style={{marginBottom:13}}>
          <label style={{fontSize:12,fontWeight:600,color:T.textDim,display:'block',marginBottom:5}}>Contact Number</label>
          {inp(contact,setContact,{placeholder:'09xxxxxxxxx',type:'tel'})}
        </div>
      </div>

      {/* Submit button — fixed at bottom */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 16px 24px',background:'linear-gradient(transparent,#f4f6f9 30%)',zIndex:10}}>
        <button
          onClick={handleSubmit}
          disabled={!isValid||loading}
          style={{
            width:'100%',borderRadius:13,padding:'15px 0',
            background:isValid&&!loading?col:'#e2e8f0',
            border:'none',color:isValid&&!loading?'#fff':T.textFaint,
            fontSize:16,fontWeight:700,letterSpacing:.2,
            boxShadow:isValid&&!loading?`0 6px 20px ${col}45`:'none',
            transition:'all .2s',
            display:'flex',alignItems:'center',justifyContent:'center',gap:8,
          }}
        >
          {loading
            ?<><div style={{width:18,height:18,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin 1s linear infinite'}}/> Submitting…</>
            :'Submit Report'
          }
        </button>
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState('home');
  const [flow,setFlow]=useState(null); // null | 'type' | 'details' | 'submitted'
  const [selType,setSelType]=useState(null);
  const [submittedReport,setSubmittedReport]=useState(null);
  const [reports,setReports]=useState(SEED_REPORTS);
  const [dir,setDir]=useState('forward'); // 'forward' | 'back'

  const navigate=(screen,direction='forward')=>{
    setDir(direction);
    setFlow(screen);
  };

  const handleTypeSelect=(incType)=>{
    setSelType(incType);
    navigate('details');
  };

  const handleSubmit=(report)=>{
    setReports(prev=>[report,...prev]);
    setSubmittedReport(report);
    navigate('submitted');
  };

  const handleHome=()=>{
    setFlow(null);
    setTab('home');
    setSelType(null);
    setSubmittedReport(null);
  };

  const handleTrack=()=>{
    setFlow(null);
    setTab('reports');
    setSelType(null);
    setSubmittedReport(null);
  };

  // Screen to render in flow vs tab
  const renderFlow=()=>{
    if(!flow) return null;
    if(flow==='type') return <TypeScreen onSelect={handleTypeSelect} onBack={()=>navigate(null,'back')}/>;
    if(flow==='details') return <DetailsScreen incType={selType} onSubmit={handleSubmit} onBack={()=>navigate('type','back')}/>;
    if(flow==='submitted') return <SubmittedScreen report={submittedReport} onHome={handleHome} onTrack={handleTrack}/>;
  };

  const renderTab=()=>{
    if(tab==='home') return <HomeScreen onReport={()=>navigate('type')} reports={reports}/>;
    if(tab==='reports') return <ReportsScreen reports={reports}/>;
    if(tab==='about') return <AboutScreen/>;
  };

  const isInFlow=!!flow;
  const showNav=!isInFlow || flow==='submitted';

  return(
    <div className="phone">
      <StatusBar/>
      <div className="screen-wrap">
        {/* Tab screens */}
        <div className="screen active" style={{display:isInFlow?'none':'flex'}}>
          {renderTab()}
        </div>
        {/* Flow screens */}
        {isInFlow&&(
          <div className="screen active">
            {renderFlow()}
          </div>
        )}
      </div>
      {(!isInFlow||flow==='submitted')&&<BottomNav active={tab} onNav={t=>{setTab(t);setFlow(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
